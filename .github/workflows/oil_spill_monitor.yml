name: Oil Spill Monitor

on:
  workflow_dispatch:
  schedule:
    # كل 30 دقيقة (عدّلها حسب رغبتك)
    - cron: "*/30 * * * *"

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # لو عندك مفاتيح/أسرار إضافية أضفها هنا مثل:
          # CREODIAS_USERNAME: ${{ secrets.CREODIAS_USERNAME }}
          # CREODIAS_PASSWORD: ${{ secrets.CREODIAS_PASSWORD }}
        run: |
          python oil_spill_monitor.py

      # (اختياري) إذا سكربتك ينتج state.json وتبي تحفظه في الريبو:
      - name: Commit state.json (if changed)
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git diff --cached --quiet || git commit -m "Update state.json"
            git push
          else
            echo "No state.json found, skipping commit."
          fi
