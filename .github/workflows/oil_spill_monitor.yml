name: Oil Spill Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # (اختياري لكن مفيد) تأكد أن الـ secrets موجودة قبل تشغيل السكربت
      - name: Check secrets (safe)
        run: |
          echo "CDSE_CLIENT_ID exists? -> ${{ secrets.CDSE_CLIENT_ID != '' }}"
          echo "CDSE_CLIENT_SECRET exists? -> ${{ secrets.CDSE_CLIENT_SECRET != '' }}"
          echo "TELEGRAM_BOT_TOKEN exists? -> ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
          echo "TELEGRAM_CHAT_ID exists? -> ${{ secrets.TELEGRAM_CHAT_ID != '' }}"

      - name: Run monitor
        env:
          # ✅ Copernicus / CDSE
          CDSE_CLIENT_ID: ${{ secrets.CDSE_CLIENT_ID }}
          CDSE_CLIENT_SECRET: ${{ secrets.CDSE_CLIENT_SECRET }}

          # ✅ Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python oil_spill_monitor.py

      - name: Commit state.json (if changed)
        run: |
          if [ -f state.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git diff --cached --quiet || git commit -m "Update state.json"
            git push
          else
            echo "No state.json found, skipping commit."
          fi
